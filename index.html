    const promptLibrary = [
      { category: "RGCTE Framework (Blank)", prompt: "Use this structure for ANY prompt you build:\n\nROLE: You are a [job title/expertise] at [type of company]...\nGOAL: I need [what success looks like \u2014 what will you do with this output?]...\nCONTEXT: [The situation \u2014 who, what, when, why, constraints, background]...\nTASK: Please create/draft/analyze [exactly what to produce, in what format, with what sections]...\nEVALUATION: [Quality criteria \u2014 tone, length, audience, what to avoid, how you'll judge it]...", icon: "\u{1F9EC}" },
      { category: "Executive Briefings", prompt: "Role: You are a Chief of Staff at a [industry] company.\nGoal: My CEO needs to walk into a meeting feeling fully prepared in under 5 minutes of reading.\nContext: Meeting with [Person/Company]. [Add any known context about the meeting purpose.]\nTask: Create a 1-page briefing covering: company overview, key people to know, recent news, talking points, and 3 smart questions to ask.\nEvaluation: Concise, CEO-ready. No section longer than 3 sentences. No jargon.", icon: "\u{1F4CB}" },
      { category: "Email Drafting", prompt: "Role: You are drafting on behalf of a CEO who is [warm but direct / formal / casual].\nGoal: The recipient should [take specific action / feel acknowledged / understand the decision].\nContext: [Describe the situation and relationship with recipient.]\nTask: Draft a professional email under [X] words. The key message is: [main point].\nEvaluation: Should sound human, not corporate. A real person wrote this.", icon: "\u2709\uFE0F" },
      { category: "Meeting Agendas", prompt: "Create a timed agenda for a [duration] meeting with [attendees]. The goals are: [list goals]. Include discussion questions for each section and a format for capturing decisions and action items.", icon: "\u{1F4C5}" },
      { category: "Document Summary", prompt: "Role: Executive Operations Partner preparing materials for a busy CEO.\nGoal: CEO has [X minutes] and needs to understand the key points and decisions required.\nContext: [PASTE YOUR DOCUMENT HERE]\nTask: Synthesize into: (1) 3-sentence executive summary, (2) top 3 takeaways, (3) risks to flag, (4) recommended next steps.\nEvaluation: Format for a 2-minute scan. Bold the critical points. No section over 3 sentences.", icon: "\u{1F4C4}" },
      { category: "Anonymization Helper", prompt: "I need to use AI to help with a sensitive work scenario, but I can't share confidential details. Help me anonymize the following:\n\nORIGINAL SCENARIO: [Describe what you need help with, including sensitive details]\n\nPlease rewrite this scenario replacing: real company names with generic descriptions, real names with role titles, specific financial figures with relative terms (e.g., \"significant shortfall\"), and any identifying details with generic equivalents.\n\nThen help me with the anonymized version.", icon: "\u{1F512}" },
      { category: "Company Research", prompt: "Research [Company Name] and provide: overview, CEO and leadership team, recent news (last 6 months), culture signals, strategic challenges, and 3 questions that show deep understanding of their business.", icon: "\u{1F50D}" },

      { category: "Prompt Chain Starter", prompt: "I'm building an AI-powered system for [recurring task]. Help me design a prompt chain where each step feeds into the next.\n\nFor each stage, give me:\n1. The exact prompt to use\n2. What input it needs (from the previous step or from me)\n3. What output it produces (that feeds the next step)\n4. Where human judgment is required before moving on\n\nStages: [List your stages, e.g., Research \u2192 Synthesis \u2192 Draft \u2192 Review \u2192 Send]", icon: "\u{1F517}" },
      { category: "Cover Letter", prompt: "Write a cover letter for [Role] at [Company]. My background: [2-3 key experiences]. What excites me about this role: [specific reason]. Tone: professional, warm, confident. Keep it to 3 paragraphs.", icon: "\u{1F4DD}" },
      { category: "Interview Prep", prompt: "I'm interviewing for [Role] at [Company]. Generate 10 likely behavioral questions, then help me structure STAR stories for each using these experiences: [list 3-4 situations from your career].", icon: "\u{1F3A4}" },
      { category: "Status Update", prompt: "Help me write a weekly status update for my CEO. Format: Top 3 wins this week, Key decisions needed, Risks/blockers, Next week priorities. Context: [describe what happened this week].", icon: "\u{1F4CA}" },
      { category: "Tone Adjustment", prompt: "Rewrite the following text in a [more formal / more casual / more empathetic / more concise] tone while keeping the core message intact: [PASTE TEXT]", icon: "\u{1F3AD}" }

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };
      return (
        <button onClick={handleCopy} className="flex items-center gap-1 px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
          {copied ? <><Check size={14} className="text-green-600" /> <span className="text-green-600">Copied!</span></> : <><Copy size={14} /> <span>Copy Prompt</span></>}
        </button>
      );
    }

    function DayCard({ data }) {
      const [open, setOpen] = useState(false);
      return (
        <div className="border border-gray-200 rounded-xl overflow-hidden mb-3 bg-white shadow-sm hover:shadow-md transition-shadow">
          <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between p-4 text-left hover:bg-gray-50 transition-colors">
            <div className="flex items-center gap-3">
              <span className="text-2xl">{data.icon}</span>
              <div>
                <div className="flex items-center gap-2">

                </div>
                <div className="flex items-center gap-3 mt-1 text-sm text-gray-500">
                  <span className="flex items-center gap-1"><Zap size={12} /> {data.tool}</span>

              </div>

              <div className="inline-block bg-indigo-700/50 border border-indigo-500 rounded-xl px-6 py-4 text-left">

                  <span className="text-white font-bold text-2xl">56%</span> salary premium for AI skills on your resume &mdash; same job, same title, same seniority.

                    <div className="text-sm text-red-700 space-y-2">
                      <p className="font-medium text-xs uppercase tracking-wider text-red-500">AI AND AUTOMATION (PROFESSIONAL DEVELOPMENT)</p>

                    <h3 className="font-semibold text-green-800 mb-3 flex items-center gap-2">&check; After (Sprint Complete)</h3>

                      <p className="font-medium text-xs uppercase tracking-wider text-green-500">AI & AUTOMATION TOOLS</p>

                <div className="space-y-2">
                  {sprintDays.filter(d => d.resumeBullet).map((d, i) => (
                    <div key={i} className="flex items-start gap-3 p-3 bg-white border border-gray-200 rounded-lg">
                      <span className="bg-indigo-100 text-indigo-800 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold flex-shrink-0">D{d.day}</span>

          {/* Footer */}
          <div className="bg-gray-50 border-t border-gray-200 mt-12">
            <div className="max-w-3xl mx-auto px-4 py-6 text-center">
              <p className="text-sm text-gray-500">Built for Liri by Chris Murray</p>
              <p className="text-xs text-gray-400 mt-1">Part of the Pathways Forward program</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
