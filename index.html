        navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };
      return (
        <button onClick={handleCopy} className="flex items-center gap-1 px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
          {copied ? <><Check size={14} className="text-green-600" /> <span className="text-green-600">Copied!</span></> : <><Copy size={14} /> <span>Copy Prompt</span></>}
        </button>
      );
    }

    function DayCard({ data }) {
      const [open, setOpen] = useState(false);
      return (
        <div className="border border-gray-200 rounded-xl overflow-hidden mb-3 bg-white shadow-sm hover:shadow-md transition-shadow">
          <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between p-4 text-left hover:bg-gray-50 transition-colors">
            <div className="flex items-center gap-3">
              <span className="text-2xl">{data.icon}</span>
              <div>
                <div className="flex items-center gap-2">
                  <span className="text-sm font-semibold text-indigo-900 bg-indigo-50 px-2 py-0.5 rounded">Day {data.day}</span>
                  <span className="font-semibold text-gray-900">{data.title}</span>
                </div>
                <div className="flex items-center gap-3 mt-1 text-sm text-gray-500">
                  <span className="flex items-center gap-1"><Zap size={12} /> {data.tool}</span>
                  <span className="flex items-center gap-1"><Clock size={12} /> {data.time}</span>
                </div>
              </div>
            </div>
            {open ? <ChevronDown size={20} className="text-gray-400" /> : <ChevronRight size={20} className="text-gray-400" />}
          </button>
          {open && (
            <div className="px-4 pb-4 border-t border-gray-100">
              <div className="mt-4 p-3 bg-indigo-50 rounded-lg">
                <p className="text-sm text-indigo-900 font-medium">Objective</p>
                <p className="text-sm text-indigo-800 mt-1">{data.objective}</p>
              </div>
              <div className="mt-4">
                <h4 className="font-semibold text-gray-900 flex items-center gap-2"><Target size={16} /> {data.exercise.title}</h4>
                <p className="text-sm text-gray-600 mt-1 italic">{data.exercise.scenario}</p>
                <ol className="mt-3 space-y-2">
                  {data.exercise.steps.map((step, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-gray-700">
                      <span className="bg-indigo-100 text-indigo-800 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5">{i + 1}</span>
                      {step}
                    </li>
                  ))}
                </ol>
              </div>
              {data.prompt && (
                <div className="mt-4">
                  <div className="flex items-center justify-between mb-2">
                    <h4 className="font-semibold text-gray-900 flex items-center gap-2"><BookOpen size={16} /> Prompt Template</h4>
                    <CopyButton text={data.prompt} />
                  </div>
                  <pre className="bg-gray-900 text-gray-100 p-4 rounded-lg text-sm overflow-x-auto whitespace-pre-wrap font-mono leading-relaxed">{data.prompt}</pre>
                </div>
              )}
              {data.toolLink && (
                <a href={data.toolLink} target="_blank" rel="noopener noreferrer" className="mt-4 inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
                  Open {data.tool} <ExternalLink size={14} />
                </a>
              )}
              {data.resumeBullet && (
                <div className="mt-4 p-3 bg-green-50 border border-green-200 rounded-lg">
                  <p className="text-sm text-green-800 font-medium flex items-center gap-2"><Award size={14} /> Resume Bullet Earned</p>
                  <p className="text-sm text-green-700 mt-1">"{data.resumeBullet}"</p>
                </div>
              )}
              {data.tip && (
                <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg">
                  <p className="text-sm text-amber-900"><span className="font-semibold">Pro Tip:</span> {data.tip}</p>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("sprint");

      return (
        <div className="min-h-screen bg-gradient-to-b from-indigo-50 via-white to-white">
          {/* Hero */}
          <div className="bg-gradient-to-r from-indigo-900 via-indigo-800 to-indigo-900 text-white">
            <div className="max-w-3xl mx-auto px-4 py-12 text-center">
              <p className="text-indigo-300 text-sm font-medium tracking-widest uppercase mb-2">AI Skills Sprint</p>
              <h1 className="text-4xl font-bold mb-3">Liri's 14-Day AI Sprint</h1>
              <p className="text-indigo-200 text-lg mb-6">From AI-curious to AI-capable. 45 minutes a day.</p>
              <div className="inline-block bg-indigo-700/50 border border-indigo-500 rounded-xl px-6 py-4 text-left">
                <p className="text-indigo-100 text-sm">
                  <span className="text-white font-bold text-2xl">56%</span> salary premium for AI skills on your resume &mdash; same job, same title, same seniority.
                </p>
                <p className="text-indigo-300 text-xs mt-1">Source: The Algorithmic Bridge, 2026</p>
              </div>
            </div>
          </div>

          {/* Navigation Tabs */}
          <div className="sticky top-0 z-10 bg-white border-b border-gray-200 shadow-sm">
            <div className="max-w-3xl mx-auto px-4 flex gap-1">
              {[
                { id: "sprint", label: "Daily Sprint", IconComp: Zap },
                { id: "prompts", label: "Prompt Library", IconComp: BookOpen },
                { id: "resume", label: "Resume Builder", IconComp: Award }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                  className={`flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 transition-colors ${activeTab === tab.id ? "border-indigo-600 text-indigo-600" : "border-transparent text-gray-500 hover:text-gray-700"}`}>
                  <tab.IconComp size={16} /> {tab.label}
                </button>
              ))}
            </div>
          </div>

          <div className="max-w-3xl mx-auto px-4 py-8">
            {/* Sprint Tab */}
            {activeTab === "sprint" && (
              <div>
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900 mb-2">Your 14-Day Sprint</h2>
                  <p className="text-gray-600">Each day builds on the last. Open a card, follow the steps, copy the prompts, and practice. By Day 14, you'll have real AI skills and a portfolio to prove it.</p>
                </div>
                <div className="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                  <p className="text-sm text-blue-800"><span className="font-semibold">Week 1</span> &mdash; Core AI Fluency: ChatGPT, Claude, Perplexity</p>
                </div>
                {sprintDays.slice(0, 6).map((day, i) => <DayCard key={i} data={day} />)}
                <div className="mb-4 mt-6 p-3 bg-purple-50 border border-purple-200 rounded-lg">
                  <p className="text-sm text-purple-800"><span className="font-semibold">Week 2</span> &mdash; Advanced Tools & Portfolio Building</p>
                </div>
                {sprintDays.slice(6).map((day, i) => <DayCard key={i + 6} data={day} />)}
              </div>
            )}

            {/* Prompt Library Tab */}
            {activeTab === "prompts" && (
              <div>
                <h2 className="text-xl font-bold text-gray-900 mb-2">Prompt Library</h2>
                <p className="text-gray-600 mb-6">Copy-paste prompts for common executive operations tasks. Customize the bracketed sections for your specific situation.</p>
                <div className="space-y-3">
                  {promptLibrary.map((item, i) => (
                    <div key={i} className="border border-gray-200 rounded-xl p-4 bg-white shadow-sm">
                      <div className="flex items-center justify-between mb-2">
                        <h3 className="font-semibold text-gray-900 flex items-center gap-2">
                          <span>{item.icon}</span> {item.category}
                        </h3>
                        <CopyButton text={item.prompt} />
                      </div>
                      <pre className="bg-gray-50 p-3 rounded-lg text-sm text-gray-700 whitespace-pre-wrap font-mono leading-relaxed">{item.prompt}</pre>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Resume Builder Tab */}
            {activeTab === "resume" && (
              <div>
                <h2 className="text-xl font-bold text-gray-900 mb-2">Resume AI Section Builder</h2>
                <p className="text-gray-600 mb-6">As you complete each day, you earn a resume bullet. Here's your before and after.</p>
                <div className="grid gap-4 md:grid-cols-2 mb-8">
                  <div className="border border-red-200 rounded-xl p-4 bg-red-50">
                    <h3 className="font-semibold text-red-800 mb-3 flex items-center gap-2">&cross; Before (Current Resume)</h3>
                    <div className="text-sm text-red-700 space-y-2">
                      <p className="font-medium text-xs uppercase tracking-wider text-red-500">AI AND AUTOMATION (PROFESSIONAL DEVELOPMENT)</p>
                      <p>&bull; Generative AI for executive productivity with verification and confidentiality practices</p>
                      <p>&bull; Workflow mapping and SOP documentation; identifying automation opportunities</p>
                      <p>&bull; Foundational AI adoption concepts: use-case intake, change management, governance guardrails</p>
                    </div>
                  </div>
                  <div className="border border-green-200 rounded-xl p-4 bg-green-50">
                    <h3 className="font-semibold text-green-800 mb-3 flex items-center gap-2">&check; After (Sprint Complete)</h3>
                    <div className="text-sm text-green-700 space-y-2">
                      <p className="font-medium text-xs uppercase tracking-wider text-green-500">AI & AUTOMATION TOOLS</p>
                      <p>&bull; ChatGPT / Claude for executive briefings, document synthesis, and stakeholder communications</p>
                      <p>&bull; Microsoft 365 Copilot for email, documents, presentations, and data analysis</p>
                      <p>&bull; Otter.ai for AI-powered meeting transcription and action-item extraction</p>
                      <p>&bull; Zapier for executive office workflow automation; Perplexity AI for competitive intelligence</p>
                    </div>
                  </div>
                </div>
                <h3 className="font-semibold text-gray-900 mb-3">All Resume Bullets You'll Earn</h3>
                <div className="space-y-2">
                  {sprintDays.filter(d => d.resumeBullet).map((d, i) => (
                    <div key={i} className="flex items-start gap-3 p-3 bg-white border border-gray-200 rounded-lg">
                      <span className="bg-indigo-100 text-indigo-800 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold flex-shrink-0">D{d.day}</span>
                      <p className="text-sm text-gray-700">{d.resumeBullet}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Footer */}
          <div className="bg-gray-50 border-t border-gray-200 mt-12">
            <div className="max-w-3xl mx-auto px-4 py-6 text-center">
              <p className="text-sm text-gray-500">Built for Liri by Chris Murray</p>
              <p className="text-xs text-gray-400 mt-1">Part of the Pathways Forward program</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
